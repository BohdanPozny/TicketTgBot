<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="api-base" content="{{ api_base }}">
  <title>Конструктор залу — Кіно</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="/static/css/miniapp.css">
</head>
<body>
<div class="app">

  <header class="header">
    <div class="header__title" id="event-title">Конструктор кінозалу</div>
    <div class="header__subtitle">Налаштуйте схему місць</div>
  </header>

  <div id="error-state" class="error-state" style="display:none">
    <div class="error-state__icon">😔</div>
    <div class="error-state__text">Виникла помилка</div>
  </div>

  <div class="content">

    <!-- Config Panel -->
    <div class="config-panel">
      <div class="config-field">
        <label>Рядів</label>
        <input type="number" id="input-rows" value="8" min="1" max="30">
      </div>
      <div class="config-field">
        <label>Місць у ряду</label>
        <input type="number" id="input-seats" value="10" min="1" max="30">
      </div>
      <button class="btn-apply" onclick="applyConfig()">Застосувати</button>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <button id="tool-block" class="tool-btn tool-btn--block active" onclick="setTool('block')">
        🚫 Заблокувати/Розблокувати
      </button>
      <button class="tool-btn tool-btn--save" onclick="saveLayout()">
        💾 Зберегти
      </button>
    </div>

    <!-- Stats -->
    <div style="font-size:0.75rem;color:var(--tg-hint);text-align:center;margin-bottom:12px" id="stats-text"></div>

    <!-- Screen label -->
    <div class="screen-label">🎬 ЕКРАН</div>

    <!-- Seat Grid -->
    <div id="seat-grid" class="seat-grid"></div>

    <!-- Hint -->
    <p style="text-align:center;font-size:0.72rem;color:var(--tg-hint);margin-top:14px">
      Натискайте на місця щоб заблокувати або розблокувати їх
    </p>

  </div>

</div>

<script>
  window.__EVENT_ID__ = {{ event_id }};
  if (!new URLSearchParams(window.location.search).get('event_id')) {
    const url = new URL(window.location.href);
    url.searchParams.set('event_id', window.__EVENT_ID__);
    window.history.replaceState({}, '', url);
  }
</script>
<script src="/static/js/cinema_partner.js"></script>
</body>
</html>
