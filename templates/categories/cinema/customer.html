<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="api-base" content="{{ api_base }}">
  <title>Вибір місця — Кіно</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="/static/css/miniapp.css">
</head>
<body>
<div class="app">

  <!-- Header -->
  <header class="header">
    <div class="header__title" id="event-title">Завантаження...</div>
    <div class="header__subtitle" id="event-datetime"></div>
  </header>

  <!-- Loading -->
  <div id="loading" class="loading">
    <div class="spinner"></div>
    Завантаження схеми залу...
  </div>

  <!-- Error -->
  <div id="error-state" class="error-state" style="display:none">
    <div class="error-state__icon">😔</div>
    <div class="error-state__text">Виникла помилка</div>
  </div>

  <!-- Seat Section -->
  <div id="seat-section" style="display:none">
    <div class="content">

      <!-- Screen label -->
      <div class="screen-label">🎬 ЕКРАН</div>

      <!-- Seat Grid -->
      <div id="seat-grid" class="seat-grid"></div>

      <!-- Legend -->
      <div class="legend">
        <div class="legend__item">
          <div class="legend__dot" style="background:rgba(34,197,94,0.2);border:1.5px solid rgba(34,197,94,0.5)"></div>
          Вільне
        </div>
        <div class="legend__item">
          <div class="legend__dot" style="background:rgba(239,68,68,0.15);border:1.5px solid rgba(239,68,68,0.35)"></div>
          Зайнято
        </div>
        <div class="legend__item">
          <div class="legend__dot" style="background:rgba(123,104,238,0.3);border:1.5px solid #7b68ee"></div>
          Вибране
        </div>
      </div>

    </div>
  </div>

  <!-- Order Bar -->
  <div class="order-bar">
    <div class="order-bar__info">
      <div class="order-bar__seat" id="order-info">Оберіть місце</div>
      <div class="order-bar__price" id="order-price">—</div>
    </div>
    <button id="btn-confirm" class="btn-confirm" disabled>Замовити</button>
  </div>

</div>

<script>
  // Передаємо event_id зі шаблону у скрипт
  window.__EVENT_ID__ = {{ event_id }};
</script>
<script>
  // Переписуємо URLSearchParams для шаблонних params
  if (!new URLSearchParams(window.location.search).get('event_id')) {
    const url = new URL(window.location.href);
    url.searchParams.set('event_id', window.__EVENT_ID__);
    window.history.replaceState({}, '', url);
  }
</script>
<script src="/static/js/cinema_customer.js"></script>
</body>
</html>
